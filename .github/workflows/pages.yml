name: Deploy Pages

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r docs/app/* _site/
          cp -r docs/prototype _site/prototype
          cat > _site/README.txt <<'EOF'
          OSINT OMÉGA — static PWA
          Default entry: index.html (mobile OSINT app)
          Prototype (neural graph demo): /prototype/
          EOF
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
