<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OSINT Ω — Minimal & Puissant</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/cytoscape@3.28.2/dist/cytoscape.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Inter, system-ui, -apple-system, sans-serif;
    background: #050816;
    color: #e2e8f0;
  }
  .glass {
    background: rgba(15, 23, 42, 0.75);
    border: 1px solid rgba(59, 130, 246, 0.25);
    backdrop-filter: blur(10px);
    border-radius: 1rem;
  }
  #cy-main {
    width: 100%;
    height: 68vh;
    min-height: 540px;
    border-radius: 1rem;
    background: radial-gradient(circle at 40% 20%, #112042 0%, #050816 70%);
  }
  .kbd {
    border: 1px solid rgba(148, 163, 184, 0.4);
    border-bottom-width: 2px;
    border-radius: .4rem;
    padding: .08rem .4rem;
    font-size: .72rem;
    color: #cbd5e1;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

const COLORS = {
  person: '#34d399',
  email: '#60a5fa',
  phone: '#a78bfa',
  social: '#f472b6',
  location: '#fbbf24',
  breach: '#f87171',
  domain: '#22d3ee',
};

function mockSearch(target) {
  const base = target.toLowerCase().replace(/\s+/g, '');
  const [first = 'target', last = 'x'] = target.split(' ');
  const domain1 = 'protonmail.ch';
  const domain2 = 'gmail.com';

  return {
    target,
    risk: Math.floor(Math.random() * 35) + 60,
    emails: [`${first}.${last}@${domain1}`.toLowerCase(), `${base}@${domain2}`],
    phones: ['+41 79 552 14 71', '+41 22 604 81 30'],
    socials: [
      { label: 'LinkedIn', handle: `@${base}` },
      { label: 'X', handle: `@${base}_intel` },
    ],
    locations: ['Zürich', 'Genève'],
    breaches: ['LinkedIn 2021', 'Dropbox 2012'],
  };
}

function buildGraph(data) {
  const nodes = [{ data: { id: 'root', label: data.target, type: 'person' } }];
  const edges = [];

  const addGroup = (prefix, items, type) => {
    const groupId = `${prefix}-group`;
    nodes.push({ data: { id: groupId, label: `${prefix.toUpperCase()} (${items.length})`, type } });
    edges.push({ data: { source: 'root', target: groupId } });

    items.forEach((value, i) => {
      const id = `${prefix}-${i}`;
      nodes.push({ data: { id, label: typeof value === 'string' ? value : `${value.label} ${value.handle}`, type } });
      edges.push({ data: { source: groupId, target: id } });

      if (prefix === 'email') {
        const domain = value.split('@')[1];
        const domainId = `domain-${domain.replace(/\./g, '-')}`;
        if (!nodes.some(n => n.data.id === domainId)) {
          nodes.push({ data: { id: domainId, label: domain, type: 'domain' } });
          edges.push({ data: { source: 'root', target: domainId, cross: true } });
        }
        edges.push({ data: { source: id, target: domainId, cross: true } });
      }
    });
  };

  addGroup('email', data.emails, 'email');
  addGroup('phone', data.phones, 'phone');
  addGroup('social', data.socials, 'social');
  addGroup('location', data.locations, 'location');
  addGroup('breach', data.breaches, 'breach');

  return { nodes, edges };
}

function App() {
  const [query, setQuery] = useState('Yannick Roth');
  const [result, setResult] = useState(() => mockSearch('Yannick Roth'));
  const [selected, setSelected] = useState(null);
  const [mode, setMode] = useState('focus');
  const graph = useMemo(() => buildGraph(result), [result]);
  const cyRef = useRef(null);
  const cyInst = useRef(null);

  useEffect(() => {
    if (!cyRef.current) return;
    if (cyInst.current) cyInst.current.destroy();

    const cy = cytoscape({
      container: cyRef.current,
      elements: [...graph.nodes, ...graph.edges],
      style: [
        {
          selector: 'node',
          style: {
            label: 'data(label)',
            color: '#fff',
            'font-size': 11,
            'background-color': ele => COLORS[ele.data('type')] || '#64748b',
            'border-width': 2,
            'border-color': '#cbd5e1',
            'text-wrap': 'wrap',
            'text-max-width': 90,
            width: 44,
            height: 44,
          },
        },
        {
          selector: '#root',
          style: { width: 86, height: 86, 'font-size': 15, 'border-color': '#fbbf24', 'border-width': 4 },
        },
        { selector: 'edge', style: { width: 1.6, 'line-color': '#3b82f6', 'target-arrow-shape': 'triangle', 'target-arrow-color': '#3b82f6', 'curve-style': 'bezier' } },
        { selector: 'edge[cross]', style: { 'line-style': 'dashed', 'line-color': '#f59e0b', 'target-arrow-color': '#f59e0b' } },
        { selector: 'node:selected', style: { 'overlay-opacity': 0.1, 'overlay-color': '#f8fafc', 'border-color': '#f8fafc' } },
      ],
      layout: {
        name: mode === 'focus' ? 'concentric' : 'cose',
        animate: true,
        animationDuration: 500,
        padding: 24,
      },
    });

    cy.on('tap', 'node', evt => {
      const d = evt.target.data();
      setSelected({ id: d.id, label: d.label, type: d.type });
    });

    cyInst.current = cy;
  }, [graph, mode]);

  useEffect(() => {
    const onKey = e => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        document.getElementById('target-input')?.focus();
      }
      if (e.key === 'f') setMode('focus');
      if (e.key === 'a') setMode('analyse');
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const doSearch = () => {
    if (!query.trim()) return;
    setResult(mockSearch(query.trim()));
    setSelected(null);
  };

  return (
    <main className="max-w-7xl mx-auto px-4 py-6 space-y-4">
      <section className="glass p-4 md:p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 className="text-2xl md:text-3xl font-black">OSINT Ω — Minimaliste & Surpuissant</h1>
          <p className="text-sm text-slate-400">Synthèse orientée action: moins de boutons, plus de signal utile.</p>
        </div>
        <div className="text-xs text-slate-400 flex gap-2 flex-wrap">
          <span className="kbd">Ctrl/Cmd + K</span> cible
          <span className="kbd">F</span> focus
          <span className="kbd">A</span> analyse
        </div>
      </section>

      <section className="grid grid-cols-1 lg:grid-cols-[1fr_310px] gap-4">
        <div className="glass p-3">
          <div className="flex gap-2 mb-3">
            <input
              id="target-input"
              className="flex-1 bg-slate-900/80 border border-slate-700 rounded-lg px-3 py-2 outline-none focus:border-blue-400"
              placeholder="Nom, email, username, téléphone..."
              value={query}
              onChange={e => setQuery(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && doSearch()}
            />
            <button onClick={doSearch} className="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 font-semibold">Analyser</button>
            <button onClick={() => setMode(mode === 'focus' ? 'analyse' : 'focus')} className="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 font-semibold">Mode: {mode}</button>
          </div>
          <div id="cy-main" ref={cyRef}></div>
        </div>

        <aside className="glass p-4 space-y-4">
          <div className="rounded-lg border border-emerald-400/40 bg-emerald-500/10 p-3">
            <p className="text-xs text-emerald-300 font-semibold mb-1">RISQUE GLOBAL</p>
            <p className="text-3xl font-black text-emerald-200">{result.risk}%</p>
          </div>

          <div>
            <h2 className="font-bold mb-2">Nœud sélectionné</h2>
            {selected ? (
              <div className="text-sm rounded-lg border border-slate-700 p-3 bg-slate-900/50">
                <p><span className="text-slate-400">ID</span>: {selected.id}</p>
                <p><span className="text-slate-400">Type</span>: {selected.type}</p>
                <p className="mt-1 font-semibold">{selected.label}</p>
              </div>
            ) : (
              <p className="text-sm text-slate-400">Cliquez un nœud pour inspection rapide.</p>
            )}
          </div>

          <div>
            <h2 className="font-bold mb-2">Synthèse (style Perplexity)</h2>
            <ul className="text-sm text-slate-300 list-disc pl-5 space-y-1">
              <li>{result.emails.length} emails corrélés avec domaines.</li>
              <li>{result.phones.length} numéros détectés.</li>
              <li>{result.socials.length} profils sociaux potentiels.</li>
              <li>{result.breaches.length} historiques de fuites à vérifier.</li>
            </ul>
          </div>
        </aside>
      </section>
    </main>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
